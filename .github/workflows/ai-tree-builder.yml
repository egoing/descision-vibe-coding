name: AI Tree Builder

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: tree-builder
  cancel-in-progress: false

jobs:
  process-issue:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'tree-suggestion')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Check API key
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "::error::ANTHROPIC_API_KEY secret이 설정되지 않았습니다."
            exit 1
          fi

      - name: Process issue and generate nodes
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python scripts/process_issue.py

      - name: Validate tree
        run: python scripts/validate_tree.py

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          BRANCH="tree/issue-${ISSUE_NUMBER}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add README.md
          git diff --staged --quiet && echo "변경 없음, 종료" && exit 0
          git commit -m "feat: add nodes from issue #${ISSUE_NUMBER}"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "🌳 Issue #${ISSUE_NUMBER}: 트리 확장" \
            --body "## Issue #${ISSUE_NUMBER} 기반 트리 확장

${ISSUE_TITLE}

자동 생성된 PR입니다. README.md의 변경 사항을 검토해 주세요.

Closes #${ISSUE_NUMBER}" \
            --base main)
          gh issue comment "${ISSUE_NUMBER}" \
            --body "🤖 PR이 생성되었습니다: $PR_URL"
