<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 260" width="640" height="260" font-family="'Pretendard', 'Apple SD Gothic Neo', sans-serif">

  <rect width="640" height="260" fill="#0f0f0f" rx="14"/>

  <!-- 코딩 — 가장 작은 원 (r=34) -->
  <circle cx="50" cy="130" r="34" fill="#4f8ef7" opacity="0.10"/>
  <circle cx="50" cy="130" r="34" fill="none" stroke="#4f8ef7" stroke-width="1.5" opacity="0.7"/>
  <text x="50" y="130" dominant-baseline="middle" text-anchor="middle" fill="#4f8ef7" font-size="12" font-weight="600">코딩</text>

  <!-- 환경 설정 — 작은 원 (r=46) -->
  <circle cx="165" cy="130" r="46" fill="#a78bfa" opacity="0.10"/>
  <circle cx="165" cy="130" r="46" fill="none" stroke="#a78bfa" stroke-width="1.6"/>
  <text x="165" y="130" dominant-baseline="middle" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="600">환경 설정</text>

  <!-- 프로젝트 관리 — 중간 원 (r=52) -->
  <circle cx="295" cy="130" r="52" fill="#f472b6" opacity="0.10"/>
  <circle cx="295" cy="130" r="52" fill="none" stroke="#f472b6" stroke-width="1.6"/>
  <text x="295" y="130" dominant-baseline="middle" text-anchor="middle" fill="#f472b6" font-size="13" font-weight="600">프로젝트 관리</text>

  <!-- AI 에이전트 — 가장 큰 원 (r=100) -->
  <circle cx="510" cy="130" r="100" fill="#34d399" opacity="0.10"/>
  <circle cx="510" cy="130" r="100" fill="none" stroke="#34d399" stroke-width="2"/>
  <text x="510" y="130" dominant-baseline="middle" text-anchor="middle" fill="#34d399" font-size="17" font-weight="700">AI 에이전트</text>

</svg>
