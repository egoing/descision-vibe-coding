<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" width="720" height="340" font-family="'Pretendard', 'Apple SD Gothic Neo', sans-serif">

  <!-- Background -->
  <rect width="720" height="340" fill="#0f0f0f" rx="16"/>

  <!-- === PAST (left side) === -->
  <text x="180" y="36" text-anchor="middle" fill="#888" font-size="13" letter-spacing="2">BEFORE AI</text>

  <!-- Coding — large circle -->
  <circle cx="180" cy="170" r="120" fill="none" stroke="#4f8ef7" stroke-width="2" opacity="0.9"/>
  <circle cx="180" cy="170" r="120" fill="#4f8ef7" opacity="0.08"/>
  <text x="180" y="155" text-anchor="middle" fill="#4f8ef7" font-size="18" font-weight="700">코딩</text>
  <text x="180" y="177" text-anchor="middle" fill="#4f8ef7" font-size="11" opacity="0.7">외국어를 배우는 것만큼</text>
  <text x="180" y="193" text-anchor="middle" fill="#4f8ef7" font-size="11" opacity="0.7">어렵고 방대한 영역</text>

  <!-- Env — medium circle, bottom-right of coding -->
  <circle cx="252" cy="234" r="58" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.85"/>
  <circle cx="252" cy="234" r="58" fill="#a78bfa" opacity="0.08"/>
  <text x="252" y="230" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="600">환경 설정</text>
  <text x="252" y="246" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="600">프로젝트 관리</text>

  <!-- Divider -->
  <line x1="360" y1="40" x2="360" y2="310" stroke="#333" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="360" y="328" text-anchor="middle" fill="#444" font-size="11">AI 등장</text>

  <!-- Arrow -->
  <text x="360" y="178" text-anchor="middle" fill="#555" font-size="22">→</text>

  <!-- === PRESENT (right side) === -->
  <text x="540" y="36" text-anchor="middle" fill="#888" font-size="13" letter-spacing="2">AFTER AI</text>

  <!-- AI — large circle -->
  <circle cx="540" cy="170" r="120" fill="none" stroke="#34d399" stroke-width="2" opacity="0.9"/>
  <circle cx="540" cy="170" r="120" fill="#34d399" opacity="0.08"/>
  <text x="540" y="155" text-anchor="middle" fill="#34d399" font-size="18" font-weight="700">AI 에이전트</text>
  <text x="540" y="177" text-anchor="middle" fill="#34d399" font-size="11" opacity="0.7">활용 · 방향 설정</text>
  <text x="540" y="193" text-anchor="middle" fill="#34d399" font-size="11" opacity="0.7">가장 핵심적인 역량</text>

  <!-- Env — medium circle -->
  <circle cx="612" cy="234" r="52" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.75"/>
  <circle cx="612" cy="234" r="52" fill="#a78bfa" opacity="0.07"/>
  <text x="612" y="230" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="600">환경 설정</text>
  <text x="612" y="245" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="600">프로젝트 관리</text>

  <!-- Coding — small circle -->
  <circle cx="468" cy="240" r="34" fill="none" stroke="#4f8ef7" stroke-width="1.5" opacity="0.65"/>
  <circle cx="468" cy="240" r="34" fill="#4f8ef7" opacity="0.07"/>
  <text x="468" y="244" text-anchor="middle" fill="#4f8ef7" font-size="12" font-weight="600">코딩</text>

</svg>
